services:
  bestest-recipes-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_pass
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  bestest-recipes-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bestest-recipes-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_pass@bestest-recipes-db:5432/recipe_db
      REDIS_URL: redis://bestest-recipes-redis:6379
      SERVER_PORT: "3000"
      NODE_ENV: production
    depends_on:
      bestest-recipes-db:
        condition: service_healthy
      bestest-recipes-redis:
        condition: service_healthy

  bestest-recipes-nutrition-analyzer:
    build:
      context: ./nutrition-analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_pass@bestest-recipes-db:5432/recipe_db
      REDIS_URL: redis://bestest-recipes-redis:6379
      PORT: "8080"
    depends_on:
      bestest-recipes-db:
        condition: service_healthy
      bestest-recipes-redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

services:
  br-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_pass
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  br-queue:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - queuedata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  br-web-cache:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - web-cachedata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  br-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_pass@br-db:5432/recipe_db
      CACHE_REDIS_URL: redis://br-web-cache:6379
      QUEUE_REDIS_URL: redis://br-queue:6379
      SERVER_PORT: "3000"
      NODE_ENV: production
    depends_on:
      br-db:
        condition: service_healthy
      br-web-cache:
        condition: service_healthy
      br-queue:
        condition: service_healthy

  br-nutrition-analyzer:
    build:
      context: ./nutrition-analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_pass@br-db:5432/recipe_db
      QUEUE_REDIS_URL: redis://br-queue:6379
      PORT: "8080"
    depends_on:
      br-db:
        condition: service_healthy
      br-queue:
        condition: service_healthy

volumes:
  pgdata:
  queuedata:
  web-cachedata:
